name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'production'
        type: choice
        options:
          - preview
          - production

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Setup EAS
        run: npm install -g eas-cli

      - name: Authenticate with Expo
        run: echo "${{ secrets.EXPO_TOKEN }}" | npx expo login --token-stdin --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build with EAS
        id: build
        run: |
          PROFILE=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.profile || 'production' }}
          echo "Using profile: $PROFILE"
          npx eas build --platform android --profile "$PROFILE" --non-interactive --wait
          BUILD_ID=$(npx eas build:list --platform android --limit 1 --json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'))[0].id")
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          npx eas build:download "$BUILD_ID" --output-dir build/
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Determine artifact name
        id: artifact
        run: |
          FILE=$(ls build/ 2>/dev/null | head -1)
          if [ -z "$FILE" ]; then
            echo "name=app-build" >> "$GITHUB_OUTPUT"
          else
            echo "name=$FILE" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: build/

  release:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: build/

      - name: Find build file
        id: find
        run: |
          FILE=$(find build/ -type f | head -1)
          echo "file=$FILE" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$FILE")" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ steps.find.outputs.file }}
